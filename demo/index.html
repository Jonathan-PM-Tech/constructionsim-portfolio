const METRIC_DEFS = [
  ["budget", "Budget"], ["schedule", "Schedule"], ["risk", "Risk Control"],
  ["morale", "Team Morale"], ["owner", "Stakeholder Sat."], ["safety", "Safety"], ["quality", "Quality"],
];
const BASELINE = 70;

const fmtM = (n) =>
  n >= 1000 ? `$${(n / 1000).toFixed(2)}B` : n >= 1 ? `$${n.toFixed(n < 10 ? 1 : 0)}M` : `$${Math.round(n * 1000)}K`;

function perfData(project, metrics, params) {
  const contM = project.budgetM * (params.contingencyPct / 100);
  const bDev = Math.max(0, BASELINE - metrics.budget) / BASELINE;
  const sDev = Math.max(0, BASELINE - metrics.schedule) / BASELINE;
  const overrunM = project.budgetM * bDev * 0.12;
  const delayDays = Math.round(project.durationMo * 30.4 * sDev * 0.16);
  return {
    cpi: (metrics.budget / BASELINE).toFixed(2),
    spi: (metrics.schedule / BASELINE).toFixed(2),
    contM, overrunM, contRemainM: contM - overrunM,
    floatDays: params.floatDays, delayDays, floatRemain: params.floatDays - delayDays,
  };
}

    return {

  const [metrics, setMetrics] = useState({ budget: 70, schedule: 70, risk: 60, morale: 70, owner: 65, safety: 75, quality: 70 });
  const [history, setHistory] = useState({ budget: [70], schedule: [70] });

  const [debrief, setDebrief] = useState(null);
  const [recovery, setRecovery] = useState(null);
  const [recoveryDone, setRecoveryDone] = useState(false);
  const [failed, setFailed] = useState(false);
  const [failReason, setFailReason] = useState("");
  const scrollRef = useRef(null);

  useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = 0; }, [stepIdx, debrief, recovery]);

  const current = SCRIPT[stepIdx];
  const avgScore = log.length ? Math.round(log.reduce((a, l) => a + l.score, 0) / log.length) : null;
  const health = Math.round(METRIC_DEFS.reduce((a, [k]) => a + metrics[k], 0) / METRIC_DEFS.length);
  const data = project ? perfData(project, metrics, params) : null;
  const slipping = metrics.budget < 55 || metrics.schedule < 55;

  function applyDeltas(deltas) {
    const m = { ...metrics };
    for (const [k] of METRIC_DEFS) m[k] = Math.max(0, Math.min(100, m[k] + (deltas[k] || 0)));
    return m;
  }

  function checkFail(m) {
    for (const [k] of METRIC_DEFS) {
      if ((k === "budget" || k === "schedule" || k === "safety") && m[k] <= params.failFloor) {
        return k === "budget" ? "Budget collapse — contingency exhausted, funding pulled"
          : k === "schedule" ? "Schedule failure — liquidated damages triggered"
          : "Safety shutdown — project stopped by serious incident record";
      }
    }
    return null;
  }

  function choose(opt) {
    const next = applyDeltas(opt.deltas);
    setMetrics(next);
    setHistory((h) => ({ budget: [...h.budget, next.budget], schedule: [...h.schedule, next.schedule] }));
    setLog((l) => [...l, { phaseIdx: current.phaseIdx, docType: current.docType, title: current.title, choice: opt.label, score: opt.score }]);
    const fr = checkFail(next);
    if (fr) { setFailed(true); setFailReason(fr); setDebrief({ ...opt, failedNow: true }); return; }
    setDebrief(opt);
  }

  function next() {
    setDebrief(null);
    if (stepIdx + 1 >= SCRIPT.length) { setScreen("final"); return; }
    setStepIdx((i) => i + 1);
  }

  function applyRecovery(opt) {
    const nextM = applyDeltas(opt.deltas);
    setMetrics(nextM);
    setHistory((h) => ({ budget: [...h.budget, nextM.budget], schedule: [...h.schedule, nextM.schedule] }));
    setLog((l) => [...l, { phaseIdx: current.phaseIdx, docType: "Recovery Plan", title: opt.name, choice: opt.name, score: opt.effectiveness }]);
    setRecovery(null);
    setRecoveryDone(true);
    const fr = checkFail(nextM);
    const grade = opt.effectiveness >= 75 ? "A" : opt.effectiveness >= 60 ? "B" : "C";
    if (fr) {
      setFailed(true); setFailReason(fr);
      setDebrief({ label: opt.name, score: opt.effectiveness, grade, outcome: opt.action, feedback: opt.tradeoff, bestPractice: "Recovery plans buy back float or contingency — they don't undo a metric that's already crossed the failure floor.", failedNow: true, deltas: opt.deltas });
    } else {
      setDebrief({ label: opt.name, score: opt.effectiveness, grade, outcome: `Recovery initiated: ${opt.action}`, feedback: opt.tradeoff, bestPractice: "A recovery plan buys back float or contingency at a cost — the right pick depends on whether cash, schedule, or stakeholder trust is more expendable right now.", deltas: opt.deltas });
    }
  }

  function reset() {
    setScreen("setup"); setStepIdx(0); setDebrief(null); setRecovery(null); setRecoveryDone(false);
    setFailed(false); setFailReason(""); setLog([]);
    setMetrics({ budget: 70, schedule: 70, risk: 60, morale: 70, owner: 65, safety: 75, quality: 70 });
    setHistory({ budget: [70], schedule: [70] });

        @keyframes pulse { 0%,100% { opacity: 1 } 50% { opacity: 0.55 } }
      `}</style>

        Recruiter demo · scripted sample playthrough, no live AI calls or backend · <a href="../README.md" style={{ color: "#8FC4DB" }}>read the full case study</a>
      </div>

      <div style={{ minHeight: "100vh", background: T.ink, padding: 18 }}>
        <div style={{ border: `1px solid ${T.edge}`, padding: 2 }}>
          <div style={{ border: `1px solid ${T.edge}`, display: "flex", flexDirection: "column", minHeight: "calc(100vh - 70px)" }}>

            <div style={{ display: "flex", alignItems: "stretch", borderBottom: `1px solid ${T.edge}`, flexWrap: "wrap" }}>
              <div style={{ padding: "12px 18px", borderRight: `1px solid ${T.edge}` }}>

                <div style={{ display: "flex", flex: 1, flexWrap: "wrap" }}>
                  {[["Role", role], ["Project", project?.name], ["Phase", PHASES[current.phaseIdx]]].map(([k, v]) => (

                  In the real product, an AI engine generates realistic field events from your actual project data
                  and grades every decision against industry best practice and your own company standards. This demo
                  swaps that live engine for a short, fixed sample playthrough — 4 real construction scenarios,
                  scored exactly like the live version — so you can try the experience with zero setup.
                </p>
                <Btn style={{ marginTop: 24, fontSize: 22, padding: "12px 34px" }} onClick={() => setScreen("setup")}>TRY THE DEMO →</Btn>
              </div>
            )}

            {screen === "setup" && (
              <div style={{ padding: "26px 22px", maxWidth: 900, margin: "0 auto", width: "100%" }}>
                <div style={h2}>01 — YOUR SEAT AT THE TABLE</div>
                <div className="csim-g3">
                  {ORGS.map(([o, d]) => (
                    <button key={o} onClick={() => { setOrg(o); setRole(null); }} style={card(org === o)}>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 19, letterSpacing: "0.06em", color: org === o ? T.gold : T.paper }}>{o}</div>
                      <div style={{ fontSize: 12.5, lineHeight: 1.45, color: T.gray }}>{d}</div>
                    </button>
                  ))}
                </div>

                {org && (
                  <>
                    <div style={h2}>02 — YOUR ROLE</div>
                    <div className="csim-g3">
                      {ROLES_BY_ORG[org].map(([r, d]) => (
                        <button key={r} onClick={() => setRole(r)} style={card(role === r)}>
                          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, letterSpacing: "0.06em", color: role === r ? T.gold : T.paper }}>{r}</div>
                          <div style={{ fontSize: 12.5, lineHeight: 1.45, color: T.gray }}>{d}</div>
                        </button>
                      ))}
                    </div>
                  </>
                )}

                <div style={h2}>03 — THE PROJECT</div>
                <div className="csim-g3">
                  {PRESETS.map((p) => (
                    <button key={p[0]} onClick={() => setPreset(p)} style={card(preset?.[0] === p[0])}>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 19, letterSpacing: "0.06em", color: preset?.[0] === p[0] ? T.gold : T.paper }}>{p[0]}</div>
                      <div style={{ fontSize: 12.5, color: T.gray }}>{p[1]}</div>
                      <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 12, letterSpacing: "0.1em", color: T.grayLight, marginTop: 4 }}>
                        {fmtM(p[2])} · {p[3]} mo · {p[4]}
                      </div>
                    </button>
                  ))}
                </div>

                <div style={{ marginTop: 30, paddingBottom: 20 }}>
                  <Btn onClick={() => setScreen("sim")} disabled={!org || !role || !preset} style={{ fontSize: 22, padding: "12px 34px" }}>MOBILIZE →</Btn>
                  {(!org || !role || !preset) && <span style={{ marginLeft: 14, fontSize: 13, color: T.gray }}>Pick your seat, role, and project.</span>}
                </div>
              </div>
            )}

            {screen === "sim" && (
              <>
                {!recovery && slipping && !recoveryDone && !debrief && (
                  <div style={{ padding: "10px 18px", background: "#3A211A", borderBottom: `1px solid ${T.orange}`, display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
                    <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 19, letterSpacing: "0.1em", color: T.orange, animation: "pulse 1.6s infinite" }}>⚠ PROJECT IN DISTRESS</span>
                    <span style={{ fontSize: 13, color: T.grayLight }}>Schedule metric has dropped into distress range.</span>
                    <Btn kind="danger" style={{ fontSize: 15, padding: "6px 16px", marginLeft: "auto" }} onClick={() => setRecovery(RECOVERY_OPTIONS)}>INITIATE RECOVERY PLAN</Btn>
                  </div>
                )}

                <div className="csim-cols" style={{ padding: 16, flex: 1 }}>
                  <div ref={scrollRef}>
                    {recovery && (
                      <div style={{ background: T.panel, border: `1px solid ${T.orange}`, borderRadius: 3, padding: 18, marginBottom: 14 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
                          <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 24, color: T.orange, letterSpacing: "0.06em" }}>RECOVERY PLAN</div>
                          <Stamp color={T.orange}>ACTION REQ'D</Stamp>
                        </div>
                        <p style={{ fontSize: 14.5, lineHeight: 1.6 }}><span style={{ color: T.gold, fontWeight: 600 }}>Diagnosis: </span>Cumulative schedule pressure from the last several events has pushed the project into distress. Contingency and float are both under strain.</p>
                        <div style={{ display: "grid", gap: 8 }}>
                          {recovery.map((o, i) => (
                            <button key={i} onClick={() => applyRecovery(o)} style={{
                              textAlign: "left", padding: "12px 14px", background: T.panel2, border: `1px solid ${T.edge}`,
                              borderLeft: `4px solid ${T.orange}`, borderRadius: 2, cursor: "pointer", color: T.grayLight,
                            }}>
                              <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap" }}>
                                <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, letterSpacing: "0.06em", color: T.paper }}>{o.name}</span>
                                <span style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, color: T.gold }}>EFFECTIVENESS {o.effectiveness}/100</span>
                              </div>
                              <div style={{ fontSize: 13.5, marginTop: 3 }}>{o.action}</div>
                              <div style={{ fontSize: 12.5, color: T.orange, marginTop: 3 }}>Trade-off: {o.tradeoff}</div>
                            </button>
                          ))}
                        </div>
                      </div>
                    )}

                    {!recovery && !debrief && (
                      <div style={{ background: T.paper, color: T.inkOnPaper, borderRadius: 3, border: `1px solid ${T.paperEdge}`, boxShadow: "0 8px 24px rgba(0,0,0,0.45)" }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 18px", borderBottom: `2px solid ${T.inkOnPaper}`, gap: 10 }}>
                          <div>
                            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 12, letterSpacing: "0.2em", textTransform: "uppercase", color: "#6B6558" }}>
                              {current.refNumber} · From {current.from}
                            </div>
                            <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 27, letterSpacing: "0.04em", lineHeight: 1.05 }}>{current.title}</div>
                          </div>
                          <Stamp color={T.orange}>{current.docType}</Stamp>
                        </div>
                        <div style={{ padding: "16px 18px", fontSize: 15, lineHeight: 1.65 }}>{current.situation}</div>
                        <div style={{ padding: "0 18px 18px" }}>
                          <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, letterSpacing: "0.18em", textTransform: "uppercase", color: "#6B6558", margin: "4px 0 8px" }}>
                            Your move, {role}
                          </div>
                          <div style={{ display: "grid", gap: 8 }}>
                            {current.options.map((o, i) => (
                              <button key={i} onClick={() => choose(o)} style={{
                                textAlign: "left", padding: "10px 14px", background: "#EAE4D6", border: `1px solid ${T.paperEdge}`,
                                borderLeft: `4px solid ${T.gold}`, borderRadius: 2, cursor: "pointer", color: T.inkOnPaper,
                              }}>
                                <span style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 17, letterSpacing: "0.06em", marginRight: 8 }}>{o.label}</span>
                                <span style={{ fontSize: 13.5 }}>{o.text}</span>
                              </button>
                            ))}
                          </div>
                          <div style={{ marginTop: 12, fontSize: 12.5, color: T.gray, fontStyle: "italic" }}>
                            The live product also grades a free-text response you write yourself — disabled in this
                            scripted demo since there's no live AI behind it here.
                          </div>
                        </div>
                      </div>
                    )}

                    {debrief && (
                      <div style={{ background: T.panel, border: `1px solid ${debrief.failedNow ? T.red : T.edge}`, borderRadius: 3, padding: 18 }}>
                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10 }}>
                          <div>
                            <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 12, letterSpacing: "0.2em", textTransform: "uppercase", color: T.gray }}>
                              Decision review · {debrief.label}
                            </div>
                            <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 26, color: T.paper, letterSpacing: "0.05em" }}>SCORE {debrief.score}/100</div>
                          </div>
                          <Stamp color={debrief.score >= 75 ? T.green : debrief.score >= 55 ? T.gold : T.orange}>GRADE {debrief.grade}</Stamp>
                        </div>
                        <p style={{ fontSize: 14.5, lineHeight: 1.6 }}><span style={{ color: T.gold, fontWeight: 600 }}>What happens: </span>{debrief.outcome}</p>
                        <p style={{ fontSize: 14.5, lineHeight: 1.6 }}><span style={{ color: T.gold, fontWeight: 600 }}>Coaching: </span>{debrief.feedback}</p>
                        <p style={{ fontSize: 14.5, lineHeight: 1.6 }}><span style={{ color: T.gold, fontWeight: 600 }}>Best practice: </span>{debrief.bestPractice}</p>
                        {debrief.failedNow && (
                          <div style={{ margin: "10px 0", padding: "10px 14px", border: `2px solid ${T.red}`, borderRadius: 3, fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, letterSpacing: "0.1em", color: T.red }}>
                            ✖ PROJECT FAILURE — {failReason}
                          </div>
                        )}
                        <div style={{ display: "flex", gap: 10, marginTop: 14, flexWrap: "wrap" }}>
                          {!debrief.failedNow && <Btn onClick={next}>{stepIdx + 1 >= SCRIPT.length ? "FINAL REPORT →" : "NEXT EVENT →"}</Btn>}
                          {debrief.failedNow && <Btn onClick={() => setScreen("final")}>POST-MORTEM REPORT</Btn>}
                        </div>
                      </div>
                    )}
                  </div>

                  <div>
                    <div style={{ background: T.panel, border: `1px solid ${T.edge}`, borderRadius: 3, padding: 16 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 12 }}>
                        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 20, color: T.paper, letterSpacing: "0.08em" }}>PROJECT HEALTH</div>
                        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 26, color: health >= 65 ? T.green : health >= 45 ? T.gold : T.orange }}>{health}</div>
                      </div>
                      {METRIC_DEFS.map(([k, n]) => <Bar key={k} label={n} value={metrics[k]} delta={debrief?.deltas?.[k]} />)}
                      {avgScore != null && (
                        <div style={{ marginTop: 12, paddingTop: 10, borderTop: `1px solid ${T.edge}`, fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, letterSpacing: "0.1em", textTransform: "uppercase", color: T.gray }}>
                          Avg score <span style={{ color: T.paper }}>{avgScore}</span> · Decisions <span style={{ color: T.paper }}>{log.length}</span>
                        </div>
                      )}
                    </div>

                    {data && (
                      <div style={{ background: T.panel, border: `1px solid ${T.edge}`, borderRadius: 3, padding: 16, marginTop: 14 }}>
                        <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 17, color: T.paper, letterSpacing: "0.08em", marginBottom: 10 }}>COST & SCHEDULE DATA</div>
                        <div style={{ fontSize: 12.5, lineHeight: 1.9 }}>
                          <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: T.gray }}>CPI</span><span style={{ color: T.paper, fontWeight: 600 }}>{data.cpi}</span></div>
                          <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: T.gray }}>SPI</span><span style={{ color: T.paper, fontWeight: 600 }}>{data.spi}</span></div>
                          <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: T.gray }}>Projected overrun</span><span style={{ color: data.overrunM > 0 ? T.orange : T.green, fontWeight: 600 }}>{fmtM(data.overrunM)}</span></div>
                          <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: T.gray }}>Projected delay</span><span style={{ color: data.delayDays > 0 ? T.orange : T.green, fontWeight: 600 }}>{data.delayDays} days</span></div>
                        </div>
                      </div>
                    )}

                    <div style={{ background: T.panel, border: `1px solid ${T.edge}`, borderRadius: 3, padding: 16, marginTop: 14 }}>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 17, color: T.paper, letterSpacing: "0.08em", marginBottom: 8 }}>PHASE TRACK</div>
                      {PHASES.map((p, i) => (
                        <div key={p} style={{ display: "flex", alignItems: "center", gap: 8, padding: "3px 0", fontSize: 13, color: i === current.phaseIdx ? T.gold : T.gray, opacity: i > current.phaseIdx ? 0.5 : 1 }}>
                          <span style={{ width: 8, height: 8, borderRadius: 8, background: i < current.phaseIdx ? T.green : i === current.phaseIdx ? T.gold : T.edge, flexShrink: 0 }} />
                          {p}
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              </>
            )}

            {screen === "final" && (
              <div style={{ padding: "26px 22px", maxWidth: 840, margin: "0 auto", width: "100%" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 12 }}>
                  <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 44, color: T.paper, letterSpacing: "0.05em", lineHeight: 1 }}>
                    {failed ? <>PROJECT <span style={{ color: T.red }}>POST-MORTEM</span></> : <>FINAL PERFORMANCE <span style={{ color: T.gold }}>REVIEW</span></>}
                  </div>
                  <Stamp color={failed ? T.red : health >= params.successTarget ? T.green : T.gold}>
                    {failed ? "FAILED" : health >= params.successTarget ? `WIN · ${health}/100` : `HEALTH ${health}/100`}
                  </Stamp>
                </div>
                <div style={{ fontFamily: "'Barlow Condensed', sans-serif", fontSize: 13, letterSpacing: "0.15em", textTransform: "uppercase", color: T.gray, marginTop: 6 }}>
                  {role} · {org} · {project?.name} · {log.length} decisions · avg {avgScore}
                </div>
                {failed && <div style={{ marginTop: 10, color: T.red, fontWeight: 600 }}>✖ {failReason}</div>}

                <div style={{ marginTop: 20 }}>
                  <div style={{ background: T.panel, border: `1px solid ${T.edge}`, borderLeft: `4px solid ${failed ? T.red : T.gold}`, borderRadius: 3, padding: "14px 18px", fontSize: 17, color: T.paper, fontWeight: 500 }}>
                    "{finalReport.headline}"
                  </div>
                  <p style={{ fontSize: 15, lineHeight: 1.7, marginTop: 16 }}>{finalReport.summary}</p>
                  <div className="csim-g2" style={{ marginTop: 10 }}>
                    <div style={{ background: T.panel, border: `1px solid ${T.edge}`, borderRadius: 3, padding: 16 }}>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, color: T.green, letterSpacing: "0.08em", marginBottom: 6 }}>STRENGTHS</div>
                      {finalReport.strengths.map((s, i) => <div key={i} style={{ fontSize: 14, padding: "3px 0" }}>▸ {s}</div>)}
                    </div>
                    <div style={{ background: T.panel, border: `1px solid ${T.edge}`, borderRadius: 3, padding: 16 }}>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 18, color: T.orange, letterSpacing: "0.08em", marginBottom: 6 }}>GROWTH AREAS</div>
                      {finalReport.growthAreas.map((s, i) => <div key={i} style={{ fontSize: 14, padding: "3px 0" }}>▸ {s}</div>)}
                    </div>
                  </div>
                  <p style={{ fontSize: 15, lineHeight: 1.7, marginTop: 16 }}>
                    <span style={{ color: T.gold, fontWeight: 600 }}>Next: </span>{finalReport.recommendation}
                  </p>
                  <div style={{ marginTop: 8 }}>
                    {METRIC_DEFS.map(([k, n]) => <Bar key={k} label={n} value={metrics[k]} />)}
                  </div>
                  <div style={{ marginTop: 22, display: "flex", gap: 12, paddingBottom: 16, flexWrap: "wrap" }}>
                    <Btn onClick={reset}>RUN IT BACK →</Btn>
                    <Btn kind="ghost" style={{ color: T.grayLight }} onClick={() => window.location.href = "../README.md"}>READ THE FULL CASE STUDY</Btn>
                  </div>
                </div>
              </div>
            )}

            <div style={{ marginTop: "auto", borderTop: `1px solid ${T.edge}`, padding: "8px 18px", display: "flex", justifyContent: "space-between", fontFamily: "'Barlow Condensed', sans-serif", fontSize: 11, letterSpacing: "0.2em", textTransform: "uppercase", color: T.gray }}>
              <span>ConstructionSIM · Recruiter Demo Build</span>
              <span>Live product's scenario engine: Claude (Anthropic)</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ConstructionSimDemo />);
</script>
</body>
</html>
